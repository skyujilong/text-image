[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "novel2media-core"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "langgraph>=0.2.0",
    "langgraph-checkpoint-sqlite>=1.0.0",
    "langchain-openai>=0.1.0",
    "langchain-anthropic>=0.1.0",
    "structlog>=24.1.0",
    "httpx>=0.27.0",
    "pydub>=0.25.1",
    "python-dotenv>=1.0.0",
    "json-repair>=0.30.0",
]
